# Example domain template (one of several). NOT a default — the skill is
# domain-agnostic and resolves axes per session. Loaded only if the user names
# this domain. Copy/edit to add your own.
domain: product_features
unit_of_generation: feature
axes:
  - {name: user_segment, type: categorical}   # new / power / admin / dormant ...
  - {name: surface, type: categorical}        # onboarding / editor / dashboard / mobile ...
  - {name: job, type: categorical}            # the job-to-be-done it serves
  - {name: ambition, type: continuous, range: [0.0, 1.0]}  # quick win <-> moonshot
  - {name: mechanism, type: open, primary_novelty: true}   # how it delivers the value
judge_rubric: references/judge_rubric.md
slate_size: 6
candidates_per_generation: 12
