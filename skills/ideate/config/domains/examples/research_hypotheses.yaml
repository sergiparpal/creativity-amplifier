# Example domain template (one of several). NOT a default — the skill is
# domain-agnostic and resolves axes per session. Loaded only if the user names
# this domain. Copy/edit to add your own.
domain: research_hypotheses
unit_of_generation: hypothesis
axes:
  - {name: locus, type: categorical}          # where the cause sits: product / market / ops ...
  - {name: population, type: categorical}     # which subjects/segment it concerns
  - {name: time_horizon, type: continuous, range: [0.0, 1.0]}  # acute <-> structural
  - {name: testability, type: continuous, range: [0.0, 1.0]}   # hard <-> easy to test
  - {name: causal_mechanism, type: open, primary_novelty: true}  # the proposed "why"
judge_rubric: references/judge_rubric.md
slate_size: 6
candidates_per_generation: 12
