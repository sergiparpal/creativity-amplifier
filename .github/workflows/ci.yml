name: CI

# The project's headline promise is "works the same on Windows / WSL / macOS / Linux"
# and it ships a real correctness contract (the engine `selftest`) plus a hermetic test
# suite. This workflow protects that matrix on every push and PR.
#
# Hermeticity: `tests/conftest.py` forces `CAMBRIAN_EMBEDDER=hash` and an isolated
# `CAMBRIAN_HOME`, and `selftest` forces the `hash` embedder internally, so
# **no model weights are ever downloaded** in CI. We also pin the env var below as a
# belt-and-suspenders guarantee.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # Guarantee the deterministic, download-free embedder everywhere.
      CAMBRIAN_EMBEDDER: hash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: skills/ideate/scripts/requirements-dev.txt

      - name: Install engine and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/ideate/scripts/requirements-dev.txt
          pip install -e skills/ideate/scripts --no-deps

      - name: Run test suite (hermetic)
        run: pytest -q

      - name: Run engine self-test (correctness contract)
        run: python -m cambrian_engine selftest

  bootstrap:
    # The provisioner (venv build, lock, content stamp, OS-specific interpreter
    # path) is the most failure-prone cross-platform code and the test job never
    # exercises it. Smoke-test a real foreground provision + idempotent re-run on
    # POSIX and Windows. (No model weights download: model2vec pulls weights lazily
    # at embed time, not install time.)
    name: bootstrap provisioner (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Provision into a temp venv (first run builds)
        run: python skills/ideate/scripts/bootstrap.py --venv "$RUNNER_TEMP/engine-venv"

      - name: Readiness markers are written
        run: |
          test -f "$RUNNER_TEMP/engine-venv/engine-python.txt"
          test -f "$RUNNER_TEMP/engine-venv/install.stamp"

      - name: Second run is an idempotent no-op
        run: |
          out="$(python skills/ideate/scripts/bootstrap.py --venv "$RUNNER_TEMP/engine-venv")"
          echo "$out"
          echo "$out" | grep -q "already provisioned"

  validate-plugin:
    name: validate plugin metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate JSON manifests are well-formed
        shell: python
        run: |
          import json
          import sys

          manifests = [
              ".claude-plugin/plugin.json",
              ".claude-plugin/marketplace.json",
              "hooks/hooks.json",
          ]
          failed = False
          for path in manifests:
              try:
                  with open(path, encoding="utf-8") as fh:
                      json.load(fh)
                  print(f"OK   {path}")
              except (OSError, json.JSONDecodeError) as exc:
                  print(f"FAIL {path}: {exc}")
                  failed = True
          sys.exit(1 if failed else 0)

      # Best-effort: validate with the real Claude Code CLI if it installs cleanly.
      # This must never fail the job — it skips cleanly when the CLI is unavailable.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
        continue-on-error: true

      - name: Validate with Claude Code CLI (best-effort)
        continue-on-error: true
        run: |
          if npm install -g @anthropic-ai/claude-code; then
            claude plugin validate --strict . || echo "::warning::claude plugin validate reported issues"
          else
            echo "::notice::Claude Code CLI not installable in CI; skipping plugin validate"
          fi
